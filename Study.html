<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyApp">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>StudyApp</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3d;
  --accent:#6c63ff;--accent2:#a78bfa;--green:#34d399;--red:#ff4757;
  --text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;--radius:20px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#dashboard{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;flex-shrink:0;gap:8px}
#app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
#progress-badge{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;flex:1;justify-content:center}
#progress-text{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.2px;white-space:nowrap}
#progress-text span{color:var(--accent2)}
.dash-btns{display:flex;gap:6px;flex-shrink:0}
.dash-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.dash-btn:active{transform:scale(0.9);background:var(--accent);color:#fff}
#progress-bar-wrap{height:2px;background:var(--surface2);margin:0 20px;border-radius:1px;overflow:hidden;flex-shrink:0}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width .4s ease;width:0%}
#filter-tabs{display:flex;gap:6px;padding:8px 20px 4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{padding:5px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
#card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 20px 8px;}
/* 容器本身不做3D旋转，保持2D确保点击可靠 */
.flashcard-scene{width:100%;max-width:380px;height:320px;position:relative;cursor:pointer;perspective:1200px}
/* 每个卡面独立旋转，transition在卡面上 */
.card-face{position:absolute;inset:0;border-radius:var(--radius);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px;overflow:hidden;transition:transform .55s cubic-bezier(0.23,1,0.32,1)}
.card-front{transform:rotateY(0deg)}
.card-back{transform:rotateY(180deg);pointer-events:none}
.flashcard-scene.flipped .card-front{transform:rotateY(-180deg);pointer-events:none}
.flashcard-scene.flipped .card-back{transform:rotateY(0deg);pointer-events:auto}
.card-front{background:linear-gradient(145deg,#1e1e2e,#16162a);border:1px solid var(--border);box-shadow:0 20px 60px rgba(108,99,255,.15),0 4px 20px rgba(0,0,0,.4)}
.card-front::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,99,255,.12),transparent 70%);pointer-events:none}
.card-back{background:linear-gradient(145deg,#1a1a2e,#12122a);border:1px solid rgba(108,99,255,.3);box-shadow:0 20px 60px rgba(108,99,255,.2),0 4px 20px rgba(0,0,0,.4);transform:rotateY(180deg);justify-content:flex-start;padding-top:20px}
#lang-badge{position:absolute;top:14px;left:14px;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.badge-en{background:rgba(108,99,255,.2);color:var(--accent2)}
.badge-ja{background:rgba(255,71,87,.2);color:var(--red)}
.badge-zh{background:rgba(52,211,153,.2);color:var(--green)}
.sound-btn{position:absolute;top:12px;right:12px;width:48px;height:48px;border-radius:50%;background:rgba(108,99,255,.18);border:1.5px solid rgba(108,99,255,.4);color:var(--accent2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:2;-webkit-tap-highlight-color:transparent}
.sound-btn:active{transform:scale(0.85);background:var(--accent);color:#fff}
#word-display{font-size:clamp(28px,8vw,44px);font-weight:800;letter-spacing:-1px;text-align:center;color:var(--text);line-height:1.15;word-break:break-word;margin-top:8px}
/* 正面：音标 / 平假名 */
#phonetic-display{margin-top:6px;font-size:16px;color:var(--accent2);letter-spacing:1px;min-height:22px;font-style:normal}
.tap-hint{position:absolute;bottom:16px;display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)}
/* 背面 */
#back-word{font-size:17px;font-weight:700;color:var(--accent2);letter-spacing:-0.3px;align-self:flex-start;margin-top:4px}
#back-reading{font-size:13px;color:var(--text3);align-self:flex-start;margin-bottom:2px;letter-spacing:1px}
#back-pos{font-size:12px;color:var(--accent);font-weight:600;align-self:flex-start;margin:4px 0 10px;background:rgba(108,99,255,.15);padding:3px 10px;border-radius:8px;display:none}
/* 多义词列表 */
#back-definitions{width:100%;align-self:flex-start;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:200px;scrollbar-width:none}
#back-definitions::-webkit-scrollbar{display:none}
.def-item{display:flex;flex-direction:column;gap:2px}
.def-pos{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.def-text{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:var(--text);line-height:1.35;letter-spacing:-0.2px}
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 30px;text-align:center}
#empty-state .trophy{font-size:60px}
#empty-state h2{font-size:22px;font-weight:800}
#empty-state p{font-size:14px;color:var(--text2);line-height:1.6}
.reset-btn{padding:14px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;margin-top:4px}
.reset-btn:active{transform:scale(0.95)}
#action-area{flex-shrink:0;padding:4px 20px 12px;display:flex;gap:12px}
.btn{flex:1;height:56px;border:none;border-radius:16px;font-size:17px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s cubic-bezier(0.23,1,0.32,1);letter-spacing:-0.2px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.95)}
.btn-skip{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-master{background:linear-gradient(135deg,#34d399,#10b981);color:#fff;box-shadow:0 8px 24px rgba(52,211,153,.3)}
.btn-master:active{box-shadow:0 4px 12px rgba(52,211,153,.2)}
#no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 30px;text-align:center;flex:1}
#no-data .icon{font-size:54px}
#no-data h2{font-size:22px;font-weight:800}
#no-data p{font-size:14px;color:var(--text2);line-height:1.65}
.import-cta{padding:14px 28px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s}
.import-cta:active{transform:scale(0.95)}
#import-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
#import-overlay.visible{opacity:1;pointer-events:all}
#import-sheet{width:100%;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:12px 20px 0;padding-bottom:var(--safe-bottom);transform:translateY(100%);transition:transform .38s cubic-bezier(0.23,1,0.32,1);max-height:90vh;display:flex;flex-direction:column;gap:12px}
#import-overlay.visible #import-sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 2px;flex-shrink:0}
.sheet-title{font-size:18px;font-weight:800;color:var(--text)}
.sheet-sub{font-size:13px;color:var(--text2);line-height:1.55;margin-top:-6px}
#import-textarea{flex:1;min-height:160px;max-height:38vh;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:"SF Mono","Menlo",monospace;font-size:13px;line-height:1.6;padding:14px;resize:none;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s}
#import-textarea:focus{border-color:var(--accent)}
#import-textarea::placeholder{color:var(--text3)}
#import-status{font-size:13px;color:var(--accent2);font-weight:600;min-height:18px;text-align:center}
.sheet-btns{display:flex;gap:10px;padding-bottom:10px}
.sheet-btn{flex:1;height:50px;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .18s}
.sheet-btn:active{transform:scale(0.96)}
.sheet-btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.sheet-btn-load{background:var(--accent);color:#fff}
.sheet-btn-load:disabled{opacity:.4;pointer-events:none}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
/* 语音诊断 Toast */
#voice-toast{position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:50%;transform:translateX(-50%);background:rgba(20,20,35,.95);border:1px solid var(--border);border-radius:12px;padding:9px 16px;font-size:12px;color:var(--text2);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;max-width:90vw;text-align:center}
#voice-toast.show{opacity:1}
#voice-toast.warn{border-color:var(--red);color:#ff8c8c}
.card-animate{animation:fadeSlideIn .28s cubic-bezier(0.23,1,0.32,1) both}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.speaking{animation:pulse .6s ease infinite}
</style>
</head>
<body>
<div id="app">
  <div id="dashboard">
    <div id="app-title">StudyApp</div>
    <div id="progress-badge"><span id="progress-text">载入中…</span></div>
    <div class="dash-btns">
      <div class="dash-btn" id="import-btn" title="导入词库">＋</div>
    </div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="filter-tabs">
    <div class="filter-tab active" data-filter="en">英语</div>
    <div class="filter-tab" data-filter="ja">日语</div>
    <div class="filter-tab" data-filter="N1">N1</div>
    <div class="filter-tab" data-filter="N2">N2</div>
    <div class="filter-tab" data-filter="N3">N3</div>
  </div>

  <div id="no-data" style="display:none">
    <div class="icon">📚</div>
    <h2>还没有词库</h2>
    <p>点击右上角 ＋ 导入更多单词</p>
    <button class="import-cta" onclick="openImport()">导入词库</button>
  </div>

  <div id="card-area" style="display:none">
    <div id="empty-state">
      <div class="trophy">🏆</div>
      <h2>全部掌握！</h2>
      <p>当前筛选的单词已全部掌握</p>
      <button class="reset-btn" onclick="resetMastered()">重置已掌握</button>
    </div>
    <div class="flashcard-scene" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div id="lang-badge" class="badge-en">英</div>
        <button class="sound-btn" id="sound-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
        <div id="word-display">—</div>
        <div id="phonetic-display"></div>
        <div class="tap-hint">点击查看释义</div>
      </div>
      <div class="card-face card-back">
        <div id="back-word"></div>
        <div id="back-reading"></div>
        <div id="back-pos"></div>
        <div id="back-definitions"></div>
      </div>
    </div>
  </div>

  <div id="voice-toast"></div>
  <div id="action-area" style="display:none">
    <button class="btn btn-skip" onclick="skipWord()"><span>↷</span> 换一个</button>
    <button class="btn btn-master" onclick="masterWord()"><span>✓</span> 掌握了</button>
  </div>
</div>

<div id="import-overlay" onclick="handleOverlayClick(event)">
  <div id="import-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">导入词库</div>
    <div class="sheet-sub">粘贴单词表，支持制表符、逗号或空格分隔。将追加到现有词库。</div>
    <textarea id="import-textarea" placeholder="apple	苹果&#10;差し込む	插入&#10;beautiful	adj. 美丽的" oninput="previewImport()"></textarea>
    <div id="import-status"></div>
    <div class="sheet-btns">
      <button class="sheet-btn sheet-btn-cancel" onclick="closeImport()">取消</button>
      <button class="sheet-btn sheet-btn-load" id="load-btn" onclick="loadWords()" disabled>加载</button>
    </div>
  </div>
</div>

const STORAGE_KEY='studyapp_words';
const MASTERED_KEY='studyapp_mastered';
let allWords=[];
let masteredSet=new Set();
let pool=[];
let currentIdx=-1;
let isFlipped=false;
let activeFilter='en'; // 'en'|'ja'|'N1'|'N2'|'N3'

// ── 语言检测 ──
function detectLang(text){
  if(/[぀-ヿ]/.test(text)) return 'ja';
  if(/[一-龯㐀-䶿]/.test(text)) return 'zh';
  return 'en';
}

// ── 存储 ──
function saveWords(words){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(words))}
  catch{localStorage.removeItem(STORAGE_KEY);localStorage.setItem(STORAGE_KEY,JSON.stringify(words))}
}
function loadMastered(){
  try{const r=localStorage.getItem(MASTERED_KEY);return r?new Set(JSON.parse(r)):new Set()}
  catch{return new Set()}
}
function saveMastered(){
  try{localStorage.setItem(MASTERED_KEY,JSON.stringify([...masteredSet]))}catch{}
}

// ── 词池 ──
function matchesFilter(item){
  switch(activeFilter){
    case 'en': return item.lang==='en';
    case 'ja': return item.lang==='ja';
    case 'N1': return item.lang==='ja'&&item.jlpt==='N1';
    case 'N2': return item.lang==='ja'&&item.jlpt==='N2';
    case 'N3': return item.lang==='ja'&&item.jlpt==='N3';
    default:   return true;
  }
}
function buildPool(){
  const filtered=allWords.map((_,i)=>i).filter(i=>{
    if(masteredSet.has(allWords[i].w)) return false;
    return matchesFilter(allWords[i]);
  });
  pool=filtered;
  shuffleArray(pool);
}
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function pickNext(exclude){
  const r=pool.filter(i=>i!==exclude);
  return r.length===0?-1:r[Math.floor(Math.random()*r.length)];
}

// ── 英语词典 API（音标 + 多义） ──
const DICT_CACHE_KEY='studyapp_dict_';
async function fetchEnDict(word){
  const key=DICT_CACHE_KEY+word.toLowerCase();
  const cached=localStorage.getItem(key);
  if(cached) return JSON.parse(cached);
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if(!res.ok) return null;
    const data=await res.json();
    const entry=data[0];
    const phonetic=entry?.phonetic||entry?.phonetics?.find(p=>p.text)?.text||'';
    const meanings=(entry?.meanings||[]).slice(0,4).map(m=>({
      pos:m.partOfSpeech||'',
      defs:(m.definitions||[]).slice(0,2).map(d=>d.definition||'').filter(Boolean)
    })).filter(m=>m.defs.length);
    const result={phonetic,meanings};
    try{localStorage.setItem(key,JSON.stringify(result));}catch{}
    return result;
  }catch{return null;}
}

// ── 渲染多义词到背面 ──
function renderDefinitions(item, dictData){
  const container=document.getElementById('back-definitions');
  container.innerHTML='';

  // 主释义：始终显示内置中文释义
  const mainEl=document.createElement('div');
  mainEl.className='def-item';
  mainEl.innerHTML=`<span class="def-text">${item.defClean||item.d}</span>`;
  container.appendChild(mainEl);

  // 英语补充：最多显示2条英文 API 释义
  if(item.lang==='en'&&dictData?.meanings?.length){
    let count=0;
    outer:for(const m of dictData.meanings){
      for(const def of m.defs){
        if(count>=2)break outer;
        const el=document.createElement('div');
        el.className='def-item';
        el.style.opacity='0.65';
        el.innerHTML=(m.pos?`<span class="def-pos">${m.pos}</span>`:'')
          +`<span class="def-text">${def}</span>`;
        container.appendChild(el);
        count++;
      }
    }
  }
}

// ── 渲染 ──
const BADGE_MAP={en:{cls:'badge-en',txt:'英'},ja:{cls:'badge-ja',txt:'日'},zh:{cls:'badge-zh',txt:'中'}};
function showCard(idx,silent=false){
  if(idx<0||idx>=allWords.length){showEmpty();return}
  currentIdx=idx;
  isFlipped=false;
  const item=allWords[idx];

  // 正面
  const badge=document.getElementById('lang-badge');
  const bm=BADGE_MAP[item.lang]||BADGE_MAP.en;
  badge.className=bm.cls;
  badge.textContent=bm.txt;
  document.getElementById('word-display').textContent=item.w;

  // 正面：日语显示平假名，英语先清空再异步填入音标
  if(item.lang==='ja'){
    document.getElementById('phonetic-display').textContent=item.r||'';
  } else {
    document.getElementById('phonetic-display').textContent='';
  }

  // 背面基础内容
  document.getElementById('back-word').textContent=item.w;
  const readingEl=document.getElementById('back-reading');
  readingEl.textContent=(item.lang==='ja'&&item.r&&item.r!==item.w)?item.r:'';
  const posEl=document.getElementById('back-pos');
  posEl.style.display='none';
  renderDefinitions(item, null);

  // 英语：异步获取音标和多义词
  if(item.lang==='en'){
    fetchEnDict(item.w).then(data=>{
      if(!data)return;
      // 只更新当前卡片（用户可能已换卡）
      if(allWords[currentIdx]?.w!==item.w)return;
      if(data.phonetic) document.getElementById('phonetic-display').textContent=data.phonetic;
      renderDefinitions(item, data);
    });
  }

  // 重置翻转
  const scene=document.getElementById('flashcard');
  scene.classList.remove('flipped','card-animate');
  void scene.offsetWidth;
  scene.classList.add('card-animate');
  updateDashboard();
  if(!silent) speakWord();
}
function showEmpty(){
  document.getElementById('flashcard').style.display='none';
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('action-area').style.display='none';
  updateDashboard();
}
function getFilteredTotal(){
  return allWords.filter(matchesFilter).length;
}
function updateDashboard(){
  const total=getFilteredTotal();
  const remaining=pool.length;
  const mastered=total-remaining;
  document.getElementById('progress-text').innerHTML=
    `待学：<span>${remaining}</span> / ${total}`;
  const pct=total>0?(mastered/total)*100:0;
  document.getElementById('progress-bar').style.width=pct+'%';
}
function showMainUI(){
  document.getElementById('no-data').style.display='none';
  document.getElementById('card-area').style.display='flex';
  document.getElementById('action-area').style.display='flex';
  document.getElementById('flashcard').style.display='block';
  document.getElementById('empty-state').style.display='none';
}

// ── 交互 ──
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped',isFlipped);
}
function skipWord(){
  if(!pool.length){showEmpty();return}
  const next=pickNext(currentIdx);
  if(next===-1){showEmpty();return}
  showCard(next);
}
function masterWord(){
  if(currentIdx<0)return;
  masteredSet.add(allWords[currentIdx].w);
  saveMastered();
  pool=pool.filter(i=>i!==currentIdx);
  if(!pool.length){showEmpty();return}
  const next=pickNext(currentIdx);
  if(next===-1){showEmpty();return}
  showCard(next);
}
function resetMastered(){
  masteredSet.clear();
  saveMastered();
  buildPool();
  if(pool.length){showMainUI();showCard(pool[0])}
}

// ── 筛选 ──
document.querySelectorAll('.filter-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    activeFilter=tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

    updateDashboard();

  });
});

// ── TTS ──
const LANG_TTS={en:'en-US',ja:'ja-JP',zh:'zh-CN'};
const LANG_RATE={en:0.88,ja:0.82,zh:0.88};

// 缓存已加载的声音列表，避免重复查找
let _voiceCache=null;
function getVoices(){
  if(_voiceCache&&_voiceCache.length)return _voiceCache;
  _voiceCache=window.speechSynthesis.getVoices();
  return _voiceCache;
}

// 按语言选择最佳 iOS 原生声音
function pickVoice(lang){
  const voices=getVoices();
  const targetLang=LANG_TTS[lang]||'en-US';
  const langPrefix=targetLang.split('-')[0];

  // 该语言的所有声音
  const langVoices=voices.filter(v=>v.lang===targetLang||v.lang.startsWith(langPrefix));

  // 排序：Enhanced/Premium 排前，Kyoko/Standard 排后
  langVoices.sort((a,b)=>{
    const aEnhanced=/enhanced|premium|o-ren|oren|otoya|samantha|karen/i.test(a.name)?0:1;
    const bEnhanced=/enhanced|premium|o-ren|oren|otoya|samantha|karen/i.test(b.name)?0:1;
    return aEnhanced-bEnhanced;
  });

  return langVoices[0]||null;
}

let _toastTimer=null;
function showToast(msg,warn=false){
  const el=document.getElementById('voice-toast');
  if(!el)return;
  clearTimeout(_toastTimer);
  el.textContent=msg;
  el.className=warn?'warn show':'show';
  _toastTimer=setTimeout(()=>el.className='',2800);
}

function speakWord(){
  if(currentIdx<0)return;
  const item=allWords[currentIdx];
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(item.w);
  utter.lang=LANG_TTS[item.lang]||'en-US';
  utter.rate=LANG_RATE[item.lang]||0.88;
  utter.pitch=1.0;
  const voice=pickVoice(item.lang);
  if(voice){
    utter.voice=voice;
    // 调试：显示完整声音名，确认是否用到 Enhanced
    const allJa=getVoices().filter(v=>v.lang.startsWith('ja')).map(v=>v.name).join(' | ');
    showToast(item.lang==='ja'?`🔊 ${voice.name}（所有日语：${allJa||'无'}）`:`🔊 ${voice.name}`);
  } else if(item.lang==='ja'){
    showToast('⚠️ 未找到日语声音 → 设置 > 辅助功能 > 朗读内容 > 声音 > 日语 > 下载',true);
  }
  const btn=document.getElementById('sound-btn');
  utter.onstart=()=>btn&&btn.classList.add('speaking');
  utter.onend=()=>btn&&btn.classList.remove('speaking');
  utter.onerror=()=>btn&&btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
}

// ── 解析粘贴文本 ──
function parseRawText(raw){
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>1);
  const results=[];
  for(const line of lines){
    let parts;
    if(/\t/.test(line)){parts=line.split('\t').map(s=>s.trim()).filter(Boolean)}
    else if(/,/.test(line)){parts=line.split(',').map(s=>s.trim()).filter(Boolean)}
    else{
      const m=line.match(/^(\S+(?:\s+\S+){0,3})\s{2,}(.+)$/);
      if(m)parts=[m[1],m[2]];
      else{const sp=line.indexOf(' ');if(sp>0)parts=[line.slice(0,sp),line.slice(sp+1).trim()];else continue}
    }
    if(parts.length<2)continue;
    const word=parts[0].trim();
    const defRaw=parts.slice(1).join(' ').trim();
    if(!word||!defRaw)continue;
    if(/^\d+$/.test(word))continue;
    if(/^(word|单词|英文|english|japanese|chinese)/i.test(word))continue;
    const posMatch=defRaw.match(/^((?:adj\.|adv\.|n\.|v\.|prep\.|conj\.|pron\.|int\.|num\.|vt\.|vi\.|aux\.)\s*)+/i);
    const pos=posMatch?posMatch[0].trim():'';
    const defClean=defRaw.slice(pos.length).trim();
    const lang=detectLang(word);
    results.push({w:word,d:defRaw,pos,defClean,lang});
  }
  const seen=new Set();
  return results.filter(item=>{const k=item.w;if(seen.has(k))return false;seen.add(k);return true});
}

function openImport(){
  document.getElementById('import-overlay').classList.add('visible');
  setTimeout(()=>document.getElementById('import-textarea').focus(),400);
}
function closeImport(){
  document.getElementById('import-overlay').classList.remove('visible');
}
function handleOverlayClick(e){if(e.target===document.getElementById('import-overlay'))closeImport()}
let previewDebounce=null;
function previewImport(){
  clearTimeout(previewDebounce);
  previewDebounce=setTimeout(()=>{
    const raw=document.getElementById('import-textarea').value;
    if(!raw.trim()){document.getElementById('import-status').textContent='';document.getElementById('load-btn').disabled=true;return}
    const parsed=parseRawText(raw);
    document.getElementById('import-status').textContent=
      parsed.length>0?`✓ 识别到 ${parsed.length} 个单词`:'⚠ 未识别到有效单词';
    document.getElementById('load-btn').disabled=parsed.length===0;
  },200);
}
function loadWords(){
  const raw=document.getElementById('import-textarea').value;
  const parsed=parseRawText(raw);
  if(!parsed.length)return;
  const existing=new Set(allWords.map(w=>w.w));
  const newWords=parsed.filter(item=>!existing.has(item.w));
  allWords=[...allWords,...newWords];
  saveWords(allWords);
  buildPool();
  closeImport();
  document.getElementById('import-textarea').value='';
  document.getElementById('import-status').textContent='';
  document.getElementById('load-btn').disabled=true;
  showMainUI();
  if(pool.length)showCard(pool[0]);
  else showEmpty();
}

// ── 初始化 ──
function init(){
  // 加载持久化数据
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    allWords=raw?JSON.parse(raw):[];
    // 补充 lang 字段（兼容旧数据）
    allWords=allWords.map(item=>{
      if(!item.lang)item.lang=detectLang(item.w);
      if(item.pos===undefined){
        const m=item.d?item.d.match(/^((?:adj\.|adv\.|n\.|v\.|prep\.|conj\.|pron\.|int\.|num\.|vt\.|vi\.|aux\.)\s*)+/i):null;
        item.pos=m?m[0].trim():'';
        item.defClean=item.d?item.d.slice(item.pos.length).trim():'';
      }
      return item;
    });
  }catch{allWords=[]}

  // 首次启动：载入内置词库
  if(allWords.length===0){
    allWords=BUILTIN.map(item=>({...item,pos:'',defClean:item.d}));
    saveWords(allWords);
  } else {
    // 将内置词库中有但用户数据中没有的词追加进去
    const existing=new Set(allWords.map(w=>w.w));
    const toAdd=BUILTIN.filter(item=>!existing.has(item.w))
      .map(item=>({...item,pos:'',defClean:item.d}));
    if(toAdd.length){allWords=[...allWords,...toAdd];saveWords(allWords)}
  }

  // 合并 JLPT 词库（不持久化到 localStorage）
  {
    const existingSet=new Set(allWords.map(w=>w.w));
    const jlptMerge=JLPT_WORDS.filter(w=>!existingSet.has(w.w))
      .map(w=>({...w,pos:'',defClean:w.d}));
    if(jlptMerge.length) allWords=[...allWords,...jlptMerge];
  }

  masteredSet=loadMastered();
  document.getElementById('import-btn').addEventListener('click',openImport);

  // 初始化语言筛选 tab 状态
  document.querySelector('[data-filter="en"]').classList.add('active');

  buildPool();

  if(allWords.length===0){
    document.getElementById('progress-text').textContent='暂无词库';
    return;
  }

  showMainUI();
  if(pool.length){
    showCard(pool[Math.floor(Math.random()*pool.length)]);
  }else{
    showEmpty();
  }

  // 页面隐藏时静音
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden)window.speechSynthesis.cancel();
  });
  // 预加载语音列表（iOS 需要）
  // 预热声音列表，iOS 上需要在 onvoiceschanged 后才能获取
  window.speechSynthesis.onvoiceschanged=()=>{
    _voiceCache=window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=null;
  };
  window.speechSynthesis.getVoices();
}

init();

// ── Service Worker 注册（PWA 离线支持） ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
